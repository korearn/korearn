name: GitHub README Stats Generation

on:
  schedule:
    # Se ejecuta cada 24 horas (a medianoche)
    - cron: "0 0 * * *"
  # Permite ejecutarlo manualmente
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate GitHub Metrics

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: GitHub Readme Stats
        uses: denvercoder1/github-readme-streak-stats@main
        with:
          username: ${{ github.repository_owner }}
          # personalizar tema (usando dracula)
          theme: dracula
          show_icons: true
          # Genera ambos archivos
          include_all_commits: true
          count_private: true
          # Esto genera localmente: github-stats.svg y top-langs.svg
          # (Para la racha usaremos otra action separada si prefieres)

      # --- SECCIÓN PARA STREAK ---
      - name: GitHub Readme Streak Stats
        uses: denvercoder1/github-readme-streak-stats@master
        with:
          user: ${{ github.repository_owner }}
          theme: dracula
          # Esto genera github-streak.svg

      # ---  SVGS  ---
      - name: Commit & Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add github-stats.svg github-streak.svg
          git commit -m "Update GitHub Stats SVGs" || echo "No changes to commit"
          git push

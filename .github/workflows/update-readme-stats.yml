name: GitHub README Stats Generation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate GitHub Metrics

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: GitHub Readme Stats
        uses: anuraghazra/github-readme-stats@v2
        with:
          username: ${{ github.repository_owner }}
          theme: dracula
          show_icons: true
          include_all_commits: true
          count_private: true

      - name: GitHub Readme Streak Stats
        uses: denvercoder1/github-readme-streak-stats@v2
        with:
          user: ${{ github.repository_owner }}
          theme: dracula

      - name: Commit & Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add github-stats.svg github-streak.svg
          git commit -m "Update GitHub Stats SVGs" || echo "No changes to commit"
          git push
